name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
      MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
      MACOS_SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
      APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
      SPARKLE_PUBLIC_KEY: ${{ secrets.SPARKLE_PUBLIC_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6

      - name: Run tests
        run: |
          swift test
          node --test Tests/HookTests/*.test.mjs
          python3 -m unittest discover -s Tests/HookTests -p 'test_*.py'

      - name: Validate signing configuration
        run: |
          configured=0
          for value in "$MACOS_CERTIFICATE" "$MACOS_CERTIFICATE_PASSWORD" "$MACOS_SIGN_IDENTITY" "$APPLE_API_PRIVATE_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER_ID"; do
            if [[ -n "$value" ]]; then configured=$((configured + 1)); fi
          done
          if [[ "$configured" -ne 0 && "$configured" -ne 6 ]]; then
            echo "Signing is partially configured. Set all six release secrets or remove all of them."
            exit 1
          fi
          if [[ -n "$SPARKLE_PUBLIC_KEY" || -n "$SPARKLE_PRIVATE_KEY" ]]; then
            if [[ -z "$SPARKLE_PUBLIC_KEY" || -z "$SPARKLE_PRIVATE_KEY" ]]; then
              echo "Sparkle is partially configured. Set both SPARKLE_PUBLIC_KEY and SPARKLE_PRIVATE_KEY."
              exit 1
            fi
          fi

      - name: Import Developer ID certificate
        if: ${{ env.MACOS_CERTIFICATE != '' }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/agentpulse.keychain-db"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$RUNNER_TEMP" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$RUNNER_TEMP" "$KEYCHAIN_PATH"

      - name: Prepare notarization key
        if: ${{ env.MACOS_CERTIFICATE != '' }}
        run: echo "$APPLE_API_PRIVATE_KEY" | base64 --decode > "$RUNNER_TEMP/AuthKey_$APPLE_API_KEY_ID.p8"

      - name: Build signed and notarized release
        if: ${{ env.MACOS_CERTIFICATE != '' }}
        env:
          VERSION: ${{ github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
          SIGN_IDENTITY: ${{ env.MACOS_SIGN_IDENTITY }}
          NOTARY_KEY_PATH: ${{ runner.temp }}/AuthKey_${{ env.APPLE_API_KEY_ID }}.p8
          NOTARY_KEY_ID: ${{ env.APPLE_API_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ env.APPLE_API_ISSUER_ID }}
        run: |
          VERSION="${VERSION#v}" scripts/build-app.sh

      - name: Build unsigned release
        if: ${{ env.MACOS_CERTIFICATE == '' }}
        env:
          VERSION: ${{ github.ref_name }}
          BUILD_NUMBER: ${{ github.run_number }}
          ARTIFACT_SUFFIX: -unsigned
        run: |
          VERSION="${VERSION#v}" scripts/build-app.sh

      - name: Generate Sparkle appcast
        if: ${{ env.SPARKLE_PUBLIC_KEY != '' }}
        env:
          SPARKLE_VERSION: 2.9.2
        run: |
          curl -fL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle" "$RUNNER_TEMP/appcast-input"
          tar -xf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"
          cp dist/AgentPulse-*-macos-*.zip "$RUNNER_TEMP/appcast-input/"
          echo "$SPARKLE_PRIVATE_KEY" | "$RUNNER_TEMP/sparkle/bin/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/" \
            --full-release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${GITHUB_REF_NAME}" \
            -o "$GITHUB_WORKSPACE/dist/appcast.xml" \
            "$RUNNER_TEMP/appcast-input"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets=(dist/*.zip dist/*.sha256)
          if [[ -f dist/appcast.xml ]]; then
            assets+=(dist/appcast.xml)
          fi
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --verify-tag --generate-notes --title "AgentPulse $GITHUB_REF_NAME"
          fi

  windows-release:
    needs: release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Run shared protocol contract tests
        run: >-
          dotnet run
          --project Windows/AgentPulse.Windows.ContractTests/AgentPulse.Windows.ContractTests.csproj
          --configuration Release
          -- Protocol/Fixtures/session-scenarios.json
      - name: Build Windows release
        shell: pwsh
        env:
          VERSION: ${{ github.ref_name }}
        run: scripts/build-windows.ps1 -Version ($env:VERSION -replace '^v', '') -Runtime win-x64
      - name: Upload Windows release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release upload $env:GITHUB_REF_NAME
          dist/*.zip
          dist/*.sha256
          dist/velopack-win-x64/*
          --clobber
